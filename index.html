<script>
// PCK chunk loader: 拦截对 index.pck 的 fetch，改为下载多个 chunk 后拼接
(function () {
	var originalFetch = window.fetch;
	window.fetch = function (input, init) {
		var url = (typeof input === 'string') ? input : input.url;
		if (url.indexOf('index.pck') === -1) {
			return originalFetch.apply(this, arguments);
		}
		return originalFetch('index.pck.manifest.json').then(function (r) {
			if (!r.ok) {
				return originalFetch.apply(window, [input, init]);
			}
			return r.json().then(function (manifest) {
				var chunks = manifest.chunks;
				var totalSize = manifest.totalSize;
				var loaded = 0;
				var buffers = [];

				function fetchChunk(idx) {
					if (idx >= chunks.length) {
						var result = new Uint8Array(totalSize);
						var offset = 0;
						for (var i = 0; i < buffers.length; i++) {
							result.set(new Uint8Array(buffers[i]), offset);
							offset += buffers[i].byteLength;
						}
						window.__bce_download_progress = 1;
						return Promise.resolve(new Response(result.buffer, {
							status: 200,
							headers: { 'Content-Type': 'application/octet-stream', 'Content-Length': String(totalSize) }
						}));
					}
					return originalFetch(chunks[idx]).then(function (resp) {
						if (!resp.ok) return Promise.reject(new Error('Failed to load chunk ' + chunks[idx]));
						return resp.arrayBuffer();
					}).then(function (buf) {
						buffers.push(buf);
						loaded += buf.byteLength;
						window.__bce_download_progress = loaded / totalSize;
						return fetchChunk(idx + 1);
					});
				}

				return fetchChunk(0);
			});
		}).catch(function () {
			return originalFetch.apply(window, [input, init]);
		});
	};
})();
</script>

<script>
(function () {
	function init() {
		var loader = document.createElement('div');
		loader.id = 'bce-loader';
		var tape = '<div id="bce-progress-tape">';
		for (var i = 0; i <= 100; i++) tape += '<div>加载中...' + i + '%</div>';
		tape += '</div>';

		loader.innerHTML =
			'<div id="bce-logo-pos"><img id="bce-logo" src="loader_logo.png" alt=""></div>' +
			'<div id="bce-tip">' +
				'感谢老板举办的活动 我们会好好利用这<span class="hl">5W</span>的奖金的 ~_~' +
				'<span class="small">感谢<span class="hl">AiArt</span>和<span class="hl">AiVoice</span>团队，你们是真正的<span class="hl">MVP</span></span>' +
			'</div>' +
			'<div id="bce-progress-pos"><div id="bce-progress">' +
				'<div id="bce-progress-fill"></div>' +
				'<div id="bce-progress-text">' + tape + '</div>' +
			'</div></div>' +
			'<img id="bce-start-btn" src="loader_btn.png" alt="开始游戏">';
		document.body.insertBefore(loader, document.body.firstChild);

		window.__bce_start = 0;
		window.__bce_main_ready = 0;
		window.__bce_assets_ready = 0;
		window.__bce_download_progress = 0;

		var fill = document.getElementById('bce-progress-fill');
		var tapeEl = document.getElementById('bce-progress-tape');
		var displayedPct = 0;
		var jsPhaseStarted = false;
		var FINISH_SPEED = 0.5;
		var MIN_DURATION_MS = 5000;
		var pageStartTime = performance.now();

		function setProgress(ratio) {
			if (ratio < 0) ratio = 0;
			if (ratio > 1) ratio = 1;
			fill.style.transform = 'scaleX(' + ratio + ')';
			var pct = Math.floor(ratio * 100);
			if (pct !== displayedPct) {
				displayedPct = pct;
				tapeEl.style.transform = 'translateY(-' + (pct * 20) + 'px)';
			}
		}

		function getCSSProgress() {
			var s = getComputedStyle(fill).transform;
			if (!s || s === 'none') return 0;
			var m = s.match(/matrix\(([^,]+)/);
			return m ? parseFloat(m[1]) : 0;
		}

		function startJSPhase() {
			if (jsPhaseStarted) return;
			jsPhaseStarted = true;
			var currentRatio = getCSSProgress();
			fill.classList.add('js-driven');
			tapeEl.classList.add('js-driven');
			fill.style.transform = 'scaleX(' + currentRatio + ')';
			tapeEl.style.transform = 'translateY(-' + (Math.floor(currentRatio * 100) * 20) + 'px)';
			var finishStart = performance.now();
			var startRatio = currentRatio;
			var remaining = 1 - startRatio;
			var finishDuration = remaining / FINISH_SPEED * 1000;

			var finishTimer = setInterval(function () {
				var elapsed = performance.now() - finishStart;
				var ratio = startRatio + (elapsed / finishDuration) * remaining;
				if (ratio >= 1) {
					clearInterval(finishTimer);
					setProgress(1);
					setTimeout(function () { loader.classList.add('ready'); }, 200);
				} else {
					setProgress(ratio);
				}
			}, 30);
		}

		// CSS 动画 20 秒到 90% 后，每秒 +1% 慢爬到 98%
		var slowCrawlStarted = false;
		var slowCrawlRatio = 0.90;
		setTimeout(function () {
			if (jsPhaseStarted) return;
			slowCrawlStarted = true;
			fill.classList.add('js-driven');
			tapeEl.classList.add('js-driven');
			fill.style.transform = 'scaleX(0.9)';
			tapeEl.style.transform = 'translateY(-1800px)';
			var crawlTimer = setInterval(function () {
				if (jsPhaseStarted) { clearInterval(crawlTimer); return; }
				slowCrawlRatio += 0.01;
				if (slowCrawlRatio >= 0.98) {
					slowCrawlRatio = 0.98;
					clearInterval(crawlTimer);
				}
				setProgress(slowCrawlRatio);
			}, 1000);
		}, 20000);

		function doFinish() {
			var cur = slowCrawlStarted ? slowCrawlRatio : getCSSProgress();
			jsPhaseStarted = true;
			fill.classList.add('js-driven');
			tapeEl.classList.add('js-driven');
			fill.style.transform = 'scaleX(' + cur + ')';
			tapeEl.style.transform = 'translateY(-' + (Math.floor(cur * 100) * 20) + 'px)';

			var elapsed = performance.now() - pageStartTime;
			var timeLeft = Math.max(0, MIN_DURATION_MS - elapsed);
			var remaining = 1 - cur;
			var finishDuration = Math.max(timeLeft, remaining / FINISH_SPEED * 1000);

			var finishStart = performance.now();
			var finishTimer = setInterval(function () {
				var e = performance.now() - finishStart;
				var ratio = cur + (e / finishDuration) * remaining;
				if (ratio >= 1) {
					clearInterval(finishTimer);
					setProgress(1);
					setTimeout(function () { loader.classList.add('ready'); }, 200);
				} else {
					setProgress(ratio);
				}
			}, 30);
		}

		// 轮询真实下载进度，完成后立刻接管，按剩余时间匀速跑到 100%
		var checkTimer = setInterval(function () {
			var dl = window.__bce_download_progress || 0;
			var assetsReady = window.__bce_assets_ready || 0;
			var realProgress = dl * 0.8 + assetsReady * 0.2;
			if (realProgress >= 1) {
				clearInterval(checkTimer);
				doFinish();
			}
		}, 100);

		// 点击开始游戏
		document.getElementById('bce-start-btn').addEventListener('click', function () {
			if (window.__bce_start) return;
			window.__bce_start = 1;
			var clickAt = performance.now();
			loader.classList.add('handing-off');

			var handoffTimer = setInterval(function () {
				var ready = window.__bce_main_ready === 1;
				var timeout = performance.now() - clickAt > 8000;
				if (ready || timeout) {
					clearInterval(handoffTimer);
					loader.classList.add('fade-out');
					setTimeout(function () { loader.remove(); }, 500);
				}
			}, 50);
		});
	}

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', init);
	} else {
		init();
	}
})();
</script>

	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
					if (current > 0 && total > 0) { window.__bce_download_progress = current / total; }
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
